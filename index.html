<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Label Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
    }
    form {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }
    label {
      margin-bottom: 5px;
    }
    input {
      margin-bottom: 10px;
      padding: 8px;
      font-size: 16px;
    }
    .label-container {
      width: 6in;
      height: 4in;
      border: 1px solid #000;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .label-table {
      width: 100%;
      border-collapse: collapse;
    }
    .label-table td {
      padding: 5px;
      border: 1px solid #000;
    }
    .barcode {
      text-align: center;
    }
    @media print {
      form {
        display: none;
      }
      .label-container {
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Inventory Label Generator</h1>
    <form id="labelForm">
      <label for="partNumber">Part Number (PN):</label>
      <input type="text" id="partNumber" required />
      <label for="date">Date:</label>
      <input type="date" id="date" required />
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" required />
      <label for="supplier">Supplier:</label>
      <input type="text" id="supplier" required />
      <label for="poNumber">PO Number:</label>
      <input type="text" id="poNumber" required />
      <button type="button" onclick="generateLabel()">Generate Label</button>
    </form>
    <div class="label-container" id="labelContainer">
      <table class="label-table">
        <tr><td>Part Number (PN):</td><td id="labelPartNumber"></td></tr>
        <tr><td>Date:</td><td id="labelDate"></td></tr>
        <tr><td>Quantity:</td><td id="labelQuantity"></td></tr>
        <tr><td>Supplier:</td><td id="labelSupplier"></td></tr>
        <tr><td>PO Number:</td><td id="labelPONumber"></td></tr>
      </table>
      <div class="barcode">
        <svg id="barcode"></svg>
      </div>
    </div>
    <button type="button" onclick="window.print()">Print Label</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
  <script>
    function generateLabel() {
      document.getElementById('labelPartNumber').innerText = document.getElementById('partNumber').value;
      document.getElementById('labelDate').innerText = document.getElementById('date').value;
      document.getElementById('labelQuantity').innerText = document.getElementById('quantity').value;
      document.getElementById('labelSupplier').innerText = document.getElementById('supplier').value;
      document.getElementById('labelPONumber').innerText = document.getElementById('poNumber').value;
      JsBarcode("#barcode", document.getElementById('partNumber').value, {
        format: "CODE128",
        displayValue: true,
        fontSize: 18
      });
    }
  </script>
</body>
</html>
