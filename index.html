<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Label Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }
        .form-container {
            margin-bottom: 20px;
        }
        .label-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 6in;
            height: 4in;
            border: 1px solid #000;
            padding: 0.1in;
            box-sizing: border-box;
        }
        .label-table {
            width: 100%;
            border-collapse: collapse;
        }
        .label-table td {
            padding: 5px;
            border: 1px solid #000;
        }
        .barcode-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }
        @media print {
            .form-container {
                display: none;
            }
            .container {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <label for="pn">Part Number (PN):</label>
            <input type="text" id="pn" name="pn" oninput="updateLabel()"><br><br>
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" oninput="updateLabel()"><br><br>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" oninput="updateLabel()"><br><br>
            <label for="supplier">Supplier:</label>
            <input type="text" id="supplier" name="supplier" oninput="updateLabel()"><br><br>
            <label for="po">PO #:</label>
            <input type="text" id="po" name="po" oninput="updateLabel()"><br><br>
            <button onclick="window.print()">Print Label</button>
        </div>
        <div class="label-container">
            <table class="label-table">
                <tbody><tr>
                    <td>Part Number (PN):</td>
                    <td id="label-pn">005724</td>
                </tr>
                <tr>
                    <td>Date:</td>
                    <td id="label-date">2025-05-29</td>
                </tr>
                <tr>
                    <td>Quantity:</td>
                    <td id="label-quantity">25</td>
                </tr>
                <tr>
                    <td>Supplier:</td>
                    <td id="label-supplier">Scanfil</td>
                </tr>
                <tr>
                    <td>PO #:</td>
                    <td id="label-po">25000000</td>
                </tr>
            </tbody></table>
            <div class="barcode-container">
                <svg id="barcode" width="156px" height="90px" x="0px" y="0px" viewBox="0 0 156 90" xmlns="http://www.w3.org/2000/svg" version="1.1" style="transform: translate(0,0)"><rect x="0" y="0" width="156" height="90" style="fill:#ffffff;"></rect><g transform="translate(10, 10)" style="fill:#000000;"><rect x="0" y="0" width="4" height="50"></rect><rect x="6" y="0" width="2" height="50"></rect><rect x="12" y="0" width="6" height="50"></rect><rect x="22" y="0" width="4" height="50"></rect><rect x="28" y="0" width="4" height="50"></rect><rect x="36" y="0" width="4" height="50"></rect><rect x="44" y="0" width="6" height="50"></rect><rect x="52" y="0" width="4" height="50"></rect><rect x="58" y="0" width="2" height="50"></rect><rect x="66" y="0" width="6" height="50"></rect><rect x="74" y="0" width="2" height="50"></rect><rect x="80" y="0" width="4" height="50"></rect><rect x="88" y="0" width="2" height="50"></rect><rect x="94" y="0" width="8" height="50"></rect><rect x="106" y="0" width="2" height="50"></rect><rect x="110" y="0" width="4" height="50"></rect><rect x="120" y="0" width="6" height="50"></rect><rect x="128" y="0" width="2" height="50"></rect><rect x="132" y="0" width="4" height="50"></rect><text style="font: 18px monospace" text-anchor="middle" x="68" y="70">005724</text></g></svg>
            </div>
        </div>
    </div>
    <script src="./Inventory Label Generator_files/JsBarcode.all.min.js.download"></script>
    <script>
        function updateLabel() {
            document.getElementById('label-pn').textContent = document.getElementById('pn').value;
            document.getElementById('label-date').textContent = document.getElementById('date').value;
            document.getElementById('label-quantity').textContent = document.getElementById('quantity').value;
            document.getElementById('label-supplier').textContent = document.getElementById('supplier').value;
            document.getElementById('label-po').textContent = document.getElementById('po').value;
            JsBarcode("#barcode", document.getElementById('pn').value, {
                format: "CODE128",
                displayValue: true,
                fontSize: 18,
                height: 50,
                width: 2
            });
        }
    </script>


</body></html>
